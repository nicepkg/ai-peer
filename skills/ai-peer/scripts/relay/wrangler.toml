name = "ai-peer-relay"
main = "worker.js"
compatibility_date = "2024-01-01"

# Durable Objects — one instance per room, strong consistency
[durable_objects]
bindings = [
  { name = "ROOM", class_name = "Room" }
]

# DO class creation
[[migrations]]
tag = "v1"
new_classes = ["Room"]

# Custom domain: relay.ai-peer.chat
# CF Dashboard > Workers > ai-peer-relay > Settings > Domains > Add "relay.ai-peer.chat"
